<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Trending This Week - Newsletter Generator</title>
  <style>
    :root{
      --bg:#f3f3f3;
      --card:#ffffff;
      --border:rgba(0,0,0,.12);
      --shadow:0 10px 30px rgba(0,0,0,.10);
      --accent:#5b0a3a;
      --muted:rgba(0,0,0,.65);
      --mono:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:var(--bg);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:#111;
    }
    .app{
      display:grid;
      grid-template-columns:390px 1fr;
      gap:16px;
      padding:16px;
      min-height:100vh;
      align-items:start;
    }
    .panel,.preview{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:16px;
      box-shadow:var(--shadow);
    }
    .panel{
      padding:16px;
      position:sticky;
      top:16px;
      max-height:calc(100vh - 32px);
      overflow:auto;
    }
    h1{
      margin:0 0 6px 0;
      font-size:16px;
      letter-spacing:.4px;
      text-transform:uppercase;
      color:var(--accent);
    }
    .sub{
      margin:0 0 12px 0;
      color:var(--muted);
      font-size:12px;
      line-height:1.35;
    }
    .section{
      border-top:1px solid rgba(0,0,0,.08);
      padding-top:12px;
      margin-top:12px;
    }
    .section h2{
      margin:0 0 10px 0;
      font-size:12px;
      letter-spacing:.5px;
      text-transform:uppercase;
    }
    .field{margin-bottom:10px}
    label{
      display:block;
      margin-bottom:6px;
      font-size:11px;
      letter-spacing:.35px;
      text-transform:uppercase;
      font-weight:700;
      color:var(--muted);
    }
    input[type="text"],input[type="url"],input[type="file"],textarea{
      width:100%;
      padding:10px 11px;
      border-radius:12px;
      border:1px solid rgba(0,0,0,.16);
      font:inherit;
      font-size:13px;
      outline:none;
      background:#fff;
    }
    textarea{
      min-height:120px;
      resize:vertical;
      line-height:1.4;
    }
    input:focus,textarea:focus{
      border-color:rgba(91,10,58,.55);
      box-shadow:0 0 0 4px rgba(91,10,58,.10);
    }
    .row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }
    .btns{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:8px;
    }
    button{
      border:1px solid rgba(0,0,0,.16);
      background:#fff;
      border-radius:12px;
      padding:10px 12px;
      font:inherit;
      font-weight:800;
      font-size:12px;
      letter-spacing:.4px;
      text-transform:uppercase;
      cursor:pointer;
    }
    button.primary{
      background:var(--accent);
      color:#fff;
      border-color:transparent;
    }
    .hint,.mini{
      font-size:11px;
      color:var(--muted);
      line-height:1.35;
      margin-top:6px;
    }
    .img-preview{
      margin-top:8px;
      width:100%;
      max-width:220px;
      border:1px solid rgba(0,0,0,.12);
      border-radius:12px;
      padding:8px;
      background:#fff;
    }
    .img-preview img{
      width:100%;
      height:auto;
      display:block;
      border-radius:8px;
      object-fit:contain;
    }
    .preview{padding:16px}
    .tabs{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:12px;
    }
    .frame{
      width:100%;
      height:780px;
      border:1px solid rgba(0,0,0,.12);
      border-radius:12px;
      background:#fff;
    }
    #htmlOut{
      width:100%;
      height:780px;
      border:1px solid rgba(0,0,0,.12);
      border-radius:12px;
      padding:12px;
      font-family:var(--mono);
      font-size:12px;
      line-height:1.35;
      resize:vertical;
    }
    @media (max-width:1100px){
      .app{grid-template-columns:1fr}
      .panel{position:relative;top:auto;max-height:none}
      .frame,#htmlOut{height:560px}
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="panel">
      <h1>Newsletter Generator</h1>
      <p class="sub">Add your own titles and content. Empty sections will stay hidden in the preview and final HTML.</p>

      <form id="form">
        <div class="section">
          <h2>Top Bar</h2>

          <div class="field">
            <label for="logoUrl">Logo URL</label>
            <input id="logoUrl" type="url" value="" placeholder="https://example.com/logo.png" />
          </div>

          <div class="field">
            <label for="logoUpload">Upload Logo</label>
            <input id="logoUpload" type="file" accept="image/*" />
            <div class="btns">
              <button type="button" id="clearLogo">Clear Logo</button>
            </div>
            <div class="img-preview" id="logoPreviewBox" style="display:none;">
              <img id="logoPreview" alt="Logo preview">
            </div>
            <div class="mini">Use a hosted image URL if this will be sent by email.</div>
          </div>

          <div class="row">
            <div class="field">
              <label for="topLinkText">Top Right Link Text</label>
              <input id="topLinkText" type="text" value="" placeholder="Revenue Strategy" />
            </div>
            <div class="field">
              <label for="topLinkUrl">Top Right Link URL</label>
              <input id="topLinkUrl" type="url" value="" placeholder="https://example.com" />
            </div>
          </div>

          <div class="field">
            <label for="audienceText">Audience Text</label>
            <input id="audienceText" type="text" value="" placeholder="Audience: Revenue Org" />
          </div>
        </div>

        <div class="section">
          <h2>Hero</h2>

          <div class="field">
            <label for="heroTitle">Main Title</label>
            <input id="heroTitle" type="text" value="" placeholder="Trending This Week" />
          </div>

          <div class="field">
            <label for="heroDate">Date</label>
            <input id="heroDate" type="text" value="" placeholder="March 6, 2026" />
          </div>

          <div class="row">
            <div class="field">
              <label for="heroButtonText">Button Text</label>
              <input id="heroButtonText" type="text" value="" placeholder="Listen to the content" />
            </div>
            <div class="field">
              <label for="heroButtonUrl">Button URL</label>
              <input id="heroButtonUrl" type="url" value="" placeholder="https://example.com" />
            </div>
          </div>
        </div>

        <div class="section">
          <h2>Section 1</h2>
          <div class="field">
            <label for="s1Title">Title</label>
            <input id="s1Title" type="text" value="" placeholder="Section title" />
          </div>
          <div class="field">
            <label for="s1Body">Body</label>
            <textarea id="s1Body" placeholder="Write section content here... Use a blank line for a new paragraph. Start a line with - for bullets."></textarea>
          </div>
        </div>

        <div class="section">
          <h2>Purple Card</h2>
          <div class="field">
            <label for="purpleLabel">Badge / Label</label>
            <input id="purpleLabel" type="text" value="" placeholder="Golden Hours" />
          </div>
          <div class="field">
            <label for="purpleBody">Body</label>
            <textarea id="purpleBody" placeholder="Write callout content here..."></textarea>
          </div>
        </div>

        <div class="section">
          <h2>Section 2</h2>
          <div class="field">
            <label for="s2Title">Title</label>
            <input id="s2Title" type="text" value="" placeholder="Section title" />
          </div>
          <div class="field">
            <label for="s2Body">Body</label>
            <textarea id="s2Body" placeholder="Write section content here..."></textarea>
          </div>
        </div>

        <div class="section">
          <h2>Pink Card</h2>
          <div class="field">
            <label for="pinkLabel">Badge / Label</label>
            <input id="pinkLabel" type="text" value="" placeholder="Card label" />
          </div>
          <div class="field">
            <label for="pinkBody">Body</label>
            <textarea id="pinkBody" placeholder="Write callout content here..."></textarea>
          </div>
        </div>

        <div class="section">
          <h2>Section 3</h2>
          <div class="field">
            <label for="s3Title">Title</label>
            <input id="s3Title" type="text" value="" placeholder="Section title" />
          </div>
          <div class="field">
            <label for="s3Body">Body</label>
            <textarea id="s3Body" placeholder="Write section content here..."></textarea>
          </div>
        </div>

        <div class="section">
          <h2>Green Card</h2>
          <div class="field">
            <label for="greenLabel">Badge / Label</label>
            <input id="greenLabel" type="text" value="" placeholder="Reminders" />
          </div>
          <div class="field">
            <label for="greenBody">Body</label>
            <textarea id="greenBody" placeholder="Write callout content here..."></textarea>
          </div>
        </div>

        <div class="section">
          <h2>Footer</h2>
          <div class="field">
            <label for="footerLead">Footer Main Text</label>
            <textarea id="footerLead" placeholder="Write footer text here..."></textarea>
          </div>
          <div class="row">
            <div class="field">
              <label for="footerLinkText">Past Releases Link Text</label>
              <input id="footerLinkText" type="text" value="" placeholder="here" />
            </div>
            <div class="field">
              <label for="footerLinkUrl">Past Releases Link URL</label>
              <input id="footerLinkUrl" type="url" value="" placeholder="https://example.com" />
            </div>
          </div>
          <div class="field">
            <label for="copyrightText">Copyright</label>
            <input id="copyrightText" type="text" value="" placeholder="© 2026 Wellhub. All rights reserved." />
          </div>
        </div>

        <div class="btns">
          <button type="submit" class="primary">Generate</button>
          <button type="button" id="copyBtn">Copy HTML</button>
        </div>
      </form>
    </aside>

    <section class="preview">
      <div class="tabs">
        <button class="primary" type="button" id="showPreview">Preview</button>
        <button type="button" id="showHtml">HTML</button>
      </div>

      <iframe class="frame" id="iframePreview" title="Newsletter Preview"></iframe>
      <textarea id="htmlOut" style="display:none;" spellcheck="false"></textarea>
    </section>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    let uploadedLogoDataUri = "";

    function fileToDataUri(file){
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ""));
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function escapeHtml(s){
      return String(s || "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function pickLogoSrc(){
      return uploadedLogoDataUri || $("logoUrl").value || "";
    }

    function parseRichText(raw){
      const text = String(raw || "").trim();
      if (!text) return "";

      const blocks = text.split(/\n\s*\n/);
      return blocks.map(block => {
        const lines = block.split("\n").map(l => l.trim()).filter(Boolean);
        const allBullets = lines.length && lines.every(l => l.startsWith("- "));
        if (allBullets){
          return `<ul>${lines.map(l => `<li>${escapeHtml(l.slice(2))}</li>`).join("")}</ul>`;
        }
        return `<p>${lines.map(l => escapeHtml(l)).join("<br>")}</p>`;
      }).join("");
    }

    function renderSection(title, body){
      if (!String(title || "").trim() && !String(body || "").trim()) return "";
      return `
        <div class="section">
          ${String(title || "").trim() ? `<h2>${escapeHtml(title)}</h2>` : ""}
          ${String(title || "").trim() ? `<div class="rule"></div>` : ""}
          ${String(body || "").trim() ? `<div class="content">${parseRichText(body)}</div>` : ""}
        </div>
      `;
    }

    function renderCallout(colorClass, label, body){
      if (!String(label || "").trim() && !String(body || "").trim()) return "";
      return `
        <div class="callout ${colorClass}">
          ${String(label || "").trim() ? `<div class="badge">${escapeHtml(label)}</div>` : ""}
          ${String(body || "").trim() ? `<div class="content">${parseRichText(body)}</div>` : ""}
        </div>
      `;
    }

    function renderTopBar(data){
      const hasLogo = String(data.logoSrc || "").trim();
      const hasTopLinkText = String(data.topLinkText || "").trim();
      const hasAudience = String(data.audienceText || "").trim();

      if (!hasLogo && !hasTopLinkText && !hasAudience) return "";

      return `
        <div class="topbar">
          <div class="logo-area">
            ${hasLogo ? `<img src="${escapeHtml(data.logoSrc)}" alt="Logo">` : ""}
            ${(hasTopLinkText || hasAudience) ? `
              <div class="logo-meta">
                ${hasTopLinkText ? `<div>${data.topLinkUrl ? `<a href="${escapeHtml(data.topLinkUrl)}">${escapeHtml(data.topLinkText)}</a>` : escapeHtml(data.topLinkText)}</div>` : ""}
                ${hasAudience ? `<div>${escapeHtml(data.audienceText)}</div>` : ""}
              </div>
            ` : ""}
          </div>
        </div>
      `;
    }

    function renderHero(data){
      const hasTitle = String(data.heroTitle || "").trim();
      const hasDate = String(data.heroDate || "").trim();
      const hasButtonText = String(data.heroButtonText || "").trim();

      if (!hasTitle && !hasDate && !hasButtonText) return "";

      return `
        <div class="hero">
          ${hasTitle ? `<h1>${escapeHtml(data.heroTitle)}</h1>` : ""}
          ${hasDate ? `<div class="hero-date">${escapeHtml(data.heroDate)}</div>` : ""}
          ${hasButtonText ? `<a class="hero-btn" href="${escapeHtml(data.heroButtonUrl || "#")}">${escapeHtml(data.heroButtonText)}</a>` : ""}
        </div>
      `;
    }

    function renderFooter(data){
      const hasLead = String(data.footerLead || "").trim();
      const hasLinkText = String(data.footerLinkText || "").trim();
      const hasCopyright = String(data.copyrightText || "").trim();

      if (!hasLead && !hasLinkText && !hasCopyright) return "";

      return `
        <div class="footer">
          ${(hasLead || hasLinkText) ? `
            <div class="footer-main">
              ${hasLead ? `${parseRichText(data.footerLead)}` : ""}
              ${hasLinkText ? `<p>Past releases can be found ${data.footerLinkUrl ? `<a href="${escapeHtml(data.footerLinkUrl)}">${escapeHtml(data.footerLinkText)}</a>` : escapeHtml(data.footerLinkText)}.</p>` : ""}
            </div>
          ` : ""}
          ${hasCopyright ? `<div class="footer-rule"></div><div class="copyright">${escapeHtml(data.copyrightText)}</div>` : ""}
        </div>
      `;
    }

    function buildHtml(data){
      return `<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>${escapeHtml(data.heroTitle || "Newsletter")}</title>
<style>
  body{
    margin:0;
    background:#dcd8cf;
    color:#232323;
    font-family:Arial, Helvetica, sans-serif;
  }
  .page{
    max-width:768px;
    margin:0 auto;
    background:#dcd8cf;
    padding:28px 28px 34px;
  }
  .topbar{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:16px;
    padding-bottom:18px;
    border-bottom:1px solid #bfb7ae;
  }
  .logo-area{
    display:flex;
    align-items:flex-start;
    gap:14px;
  }
  .logo-area img{
    display:block;
    max-width:150px;
    height:auto;
  }
  .logo-meta{
    font-family:Arial, Helvetica, sans-serif;
    font-size:13px;
    line-height:1.2;
    color:#222;
    padding-top:2px;
  }
  .logo-meta a{
    color:#0d5bd7;
    font-weight:700;
    text-decoration:underline;
  }
  .hero{
    text-align:center;
    padding:34px 0 28px;
  }
  .hero h1{
    margin:0;
    font-family:Georgia, "Times New Roman", serif;
    font-size:52px;
    line-height:1.08;
    font-weight:700;
    color:#272525;
  }
  .hero-date{
    margin-top:18px;
    font-size:18px;
    line-height:1.3;
    color:#585858;
    font-weight:600;
  }
  .hero-btn{
    display:inline-block;
    margin-top:10px;
    background:#ef476f;
    color:#fff;
    padding:14px 24px;
    border-radius:8px;
    font-size:18px;
    font-weight:800;
    text-decoration:underline;
  }
  .section{
    margin-top:28px;
  }
  .section h2{
    margin:0 0 10px 0;
    font-family:Georgia, "Times New Roman", serif;
    font-size:30px;
    line-height:1.22;
    font-weight:500;
    color:#2b2726;
  }
  .rule{
    border-top:1px solid #c4bbb0;
    margin:0 0 14px 0;
  }
  .content{
    font-size:16px;
    line-height:1.65;
    color:#232323;
  }
  .content p{
    margin:0 0 12px 0;
  }
  .content ul{
    margin:6px 0 14px 24px;
    padding:0 0 0 14px;
  }
  .content li{
    margin:0 0 10px 0;
  }
  .content a{
    color:#0d5bd7;
    font-weight:700;
    text-decoration:underline;
  }
  .callout{
    margin-top:28px;
    border-radius:14px;
    padding:26px 24px 24px;
    color:#fff;
  }
  .callout .badge{
    display:inline-block;
    background:rgba(255,255,255,.8);
    color:#6a4ca8;
    border-radius:8px;
    padding:10px 18px;
    font-family:Georgia, "Times New Roman", serif;
    font-size:22px;
    line-height:1.2;
    margin-bottom:18px;
  }
  .callout .content{
    color:#fff;
    font-weight:600;
  }
  .callout .content p,
  .callout .content li{
    color:#fff;
  }
  .callout.purple{ background:#a57df2; }
  .callout.purple .badge{ color:#6d52ab; }

  .callout.pink{ background:#ef476f; }
  .callout.pink .badge{ color:#c53d5a; }

  .callout.green{ background:#146d3e; }
  .callout.green .badge{
    background:#d7ec63;
    color:#1d3813;
  }

  .footer{
    text-align:center;
    padding-top:34px;
  }
  .footer-main{
    font-size:16px;
    line-height:1.55;
    color:#555;
    font-weight:700;
  }
  .footer-main p{
    margin:0 0 8px 0;
  }
  .footer-main a{
    color:#0d5bd7;
    font-weight:700;
    text-decoration:underline;
  }
  .footer-rule{
    margin:40px 0 18px;
    border-top:1px solid #bfb7ae;
  }
  .copyright{
    font-size:14px;
    color:#8c8c8c;
  }

  @media (max-width: 640px){
    .page{ padding:18px; }
    .topbar{ flex-direction:column; }
    .hero h1{ font-size:38px; }
    .section h2{ font-size:22px; }
    .callout .badge{ font-size:18px; }
  }
</style>
</head>
<body>
  <div class="page">
    ${renderTopBar(data)}
    ${renderHero(data)}
    ${renderSection(data.s1Title, data.s1Body)}
    ${renderCallout("purple", data.purpleLabel, data.purpleBody)}
    ${renderSection(data.s2Title, data.s2Body)}
    ${renderCallout("pink", data.pinkLabel, data.pinkBody)}
    ${renderSection(data.s3Title, data.s3Body)}
    ${renderCallout("green", data.greenLabel, data.greenBody)}
    ${renderFooter(data)}
  </div>
</body>
</html>`;
    }

    function readForm(){
      return {
        logoSrc: pickLogoSrc(),
        topLinkText: $("topLinkText").value || "",
        topLinkUrl: $("topLinkUrl").value || "",
        audienceText: $("audienceText").value || "",
        heroTitle: $("heroTitle").value || "",
        heroDate: $("heroDate").value || "",
        heroButtonText: $("heroButtonText").value || "",
        heroButtonUrl: $("heroButtonUrl").value || "",
        s1Title: $("s1Title").value || "",
        s1Body: $("s1Body").value || "",
        purpleLabel: $("purpleLabel").value || "",
        purpleBody: $("purpleBody").value || "",
        s2Title: $("s2Title").value || "",
        s2Body: $("s2Body").value || "",
        pinkLabel: $("pinkLabel").value || "",
        pinkBody: $("pinkBody").value || "",
        s3Title: $("s3Title").value || "",
        s3Body: $("s3Body").value || "",
        greenLabel: $("greenLabel").value || "",
        greenBody: $("greenBody").value || "",
        footerLead: $("footerLead").value || "",
        footerLinkText: $("footerLinkText").value || "",
        footerLinkUrl: $("footerLinkUrl").value || "",
        copyrightText: $("copyrightText").value || ""
      };
    }

    function generate(){
      const html = buildHtml(readForm());
      $("htmlOut").value = html;
      $("iframePreview").srcdoc = html;
    }

    $("logoUpload").addEventListener("change", async (e) => {
      const file = e.target.files?.[0];
      if (!file) return;
      uploadedLogoDataUri = await fileToDataUri(file);
      $("logoPreview").src = uploadedLogoDataUri;
      $("logoPreviewBox").style.display = "";
      generate();
    });

    $("clearLogo").addEventListener("click", () => {
      uploadedLogoDataUri = "";
      $("logoUpload").value = "";
      $("logoPreviewBox").style.display = "none";
      generate();
    });

    [
      "logoUrl","topLinkText","topLinkUrl","audienceText",
      "heroTitle","heroDate","heroButtonText","heroButtonUrl",
      "s1Title","s1Body",
      "purpleLabel","purpleBody",
      "s2Title","s2Body",
      "pinkLabel","pinkBody",
      "s3Title","s3Body",
      "greenLabel","greenBody",
      "footerLead","footerLinkText","footerLinkUrl","copyrightText"
    ].forEach(id => {
      $(id).addEventListener("input", generate);
    });

    $("form").addEventListener("submit", (e) => {
      e.preventDefault();
      generate();
    });

    $("copyBtn").addEventListener("click", async () => {
      if (!$("htmlOut").value) generate();
      try{
        await navigator.clipboard.writeText($("htmlOut").value);
        $("copyBtn").textContent = "Copied!";
        setTimeout(() => $("copyBtn").textContent = "Copy HTML", 1200);
      }catch(err){
        alert("Copy failed. Copy from the HTML tab manually.");
      }
    });

    $("showPreview").addEventListener("click", () => {
      $("showPreview").classList.add("primary");
      $("showHtml").classList.remove("primary");
      $("iframePreview").style.display = "";
      $("htmlOut").style.display = "none";
    });

    $("showHtml").addEventListener("click", () => {
      $("showHtml").classList.add("primary");
      $("showPreview").classList.remove("primary");
      $("iframePreview").style.display = "none";
